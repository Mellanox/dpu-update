FINISHED_TASKS_LIST=()

# Helper: check if a value is in an array
in_array() {
    local needle=$1; shift
    local elem
    for elem in "$@"; do
        [[ "$elem" == "$needle" ]] && return 0
    done
    return 1
}

wait_bmc_task_id_complete()
{
	local task_id=$1

	if in_array $task_id ${FINISHED_TASKS_LIST[@]}; then
		return
	fi

	ilog "wait_bmc_task_id_complete: Monitoring ${task_id}"
	#Check upgrade progress (%).
	get_bmc_token
	output=$(curl -sSk -H "X-Auth-Token: $BMC_TOKEN" https://${BMC_IP}${task_id} 2>&1)
	percent_done=$(echo $output | jq -r ' .PercentComplete')
	SECONDS=0
	while [ "$percent_done" != "100" ]; do
		if [ "$percent_done" == "null" ]; then
			ilog "- ERROR: There is no task with task id: $task_id"
			RC=$((RC+1))
			break
		fi
		if [ $SECONDS -gt $BMC_TASK_TIMEOUT ]; then
			ilog "- ERROR: BMC task $task_id timeout"
			RC=$((RC+1))
			break
		fi
		get_bmc_token
		output=$(curl -sSk -H "X-Auth-Token: $BMC_TOKEN" https://${BMC_IP}${task_id} 2>&1)
		percent_done=$(echo $output | jq -r ' .PercentComplete')
		task_state=$(echo $output | jq -r ' .TaskState')
		if [ "$task_state" == "Exception" ]; then
			ilog "- ERROR: BMC task $task_id exception"
			RC=$((RC+1))
			break
		elif [ "$task_state" == "Cancelled" ]; then
			ilog "- ERROR: BMC task $task_id cancelled"
			RC=$((RC+1))
			break
		elif [ "$task_state" == "Aborted" ]; then
			ilog "- ERROR: BMC task $task_id aborted"
			RC=$((RC+1))
			break
		fi
		sleep 10
	done
	task_state=$(echo $output | jq -r ' .TaskState')
	task_status=$(echo $output | jq -r ' .TaskStatus')

	if [ "$task_state$task_status" != "CompletedOK" ]; then
		echo "BMC task failed:"  >> $LOG
		echo $output >> $LOG
		RC=$((RC+1))
	fi
	FINISHED_TASKS_LIST+=( "$task_id" )
	ilog "Task $task_id completed"
}

wait_all_tasks_complete()
{
    ilog "wait_all_tasks_complete"
    get_bmc_token
    task_ids=$(curl -sSk -H "X-Auth-Token: $BMC_TOKEN" -X GET https://${BMC_IP}/redfish/v1/TaskService/Tasks | jq -r ' .Members' | jq -r '.[]."@odata.id"')
    for task_id in $task_ids
    do
        wait_bmc_task_id_complete $task_id
    done
}

bmc_custom_action1()
{
    wait_all_tasks_complete
}

bmc_custom_action2()
{
    wait_all_tasks_complete
}

bmc_custom_action3()
{
    wait_all_tasks_complete
}
