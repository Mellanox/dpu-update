
wait_all_tasks_complete()
{
    prev_task_id=""
    bmc_get_task_id
    while [[ ! -z "$task_id" && "$task_id" != "$prev_task_id" ]]
    do
        prev_task_id=$task_id
        ilog "wait_all_tasks_complete"
        wait_bmc_task_complete
        bmc_get_task_id
    done
}

bmc_custom_action1()
{
    wait_all_tasks_complete
}

bmc_custom_action2()
{
    wait_all_tasks_complete
}
